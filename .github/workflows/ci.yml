name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.4
        env:
          MYSQL_ROOT_PASSWORD: rootpw
          MYSQL_DATABASE: surveillance
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost -uroot -prootpw"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=20

    env:
      MYSQL_HOST: 127.0.0.1
      MYSQL_PORT: "3306"
      MYSQL_DATABASE: surveillance
      MYSQL_USER: root
      MYSQL_PASSWORD: rootpw
      DJANGO_DEBUG: "False"
      DJANGO_SECRET_KEY: ci-test-key

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install system dependencies for mysqlclient
        run: sudo apt-get update && sudo apt-get install -y build-essential default-libmysqlclient-dev pkg-config

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Apply migrations
        run: python manage.py migrate --noinput

      - name: Run ETL
        run: python manage.py load_data

      - name: Collect static files
        run: python manage.py collectstatic --noinput

      - name: Run tests
        run: python manage.py test surveillance
